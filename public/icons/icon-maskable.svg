<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Solid background for maskable (safe zone is inner 80%) -->
  <rect width="512" height="512" fill="#0a0a0f"/>
  <!-- Window frame (inside safe zone ~100-412) -->
  <rect x="100" y="100" width="312" height="312" rx="20" fill="none" stroke="#7c3aed" stroke-width="24"/>
  <!-- Window cross dividers -->
  <line x1="256" y1="100" x2="256" y2="412" stroke="#7c3aed" stroke-width="18"/>
  <line x1="100" y1="256" x2="412" y2="256" stroke="#7c3aed" stroke-width="18"/>
</svg>
