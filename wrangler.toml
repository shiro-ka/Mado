name = "mado-spike"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext for Cloudflare uses a Worker + Assets model
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# KV namespaces (placeholder ids — fill after `wrangler kv namespace create`)
[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "REPLACE_ME_OAUTH_STATE"

[[kv_namespaces]]
binding = "OAUTH_SESSION"
id = "REPLACE_ME_OAUTH_SESSION"

[[kv_namespaces]]
binding = "MADO_SESSION"
id = "REPLACE_ME_MADO_SESSION"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_ME_RATE_LIMIT"

# D1 database (placeholder id — fill after `wrangler d1 create mado`)
[[d1_databases]]
binding = "DB"
database_name = "mado"
database_id = "REPLACE_ME_D1"

# Cron: replicate Vercel Cron schedule (daily 18:00 UTC)
[triggers]
crons = ["0 18 * * *"]

# Local dev vars live in .dev.vars (gitignored)
